name: test_notifier
description: A simple package to send test notifications on iOS and Android
version: 1.0.0
repository: https://github.com/anvistanb17-afk/test_notifier

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.test_notifier
        pluginClass: TestNotifierPlugin
      ios:
        pluginClass: TestNotifierPlugin
