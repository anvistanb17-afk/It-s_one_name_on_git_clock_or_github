name: Create Dart Project

on:
  workflow_dispatch:

jobs:
  create-project:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      
      - name: Create Dart project inside repo
        run: |
          dart create -t console my_dart_app
          echo "✅ Проект создан в папке my_dart_app/"
      
      - name: Commit and push back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my_dart_app/
          git commit -m "Add Dart project" || echo "Nothing to commit"
          git push
