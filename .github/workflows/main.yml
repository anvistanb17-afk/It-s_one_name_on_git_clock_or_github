name: Create Flutter Project

on:
  workflow_dispatch:

jobs:
  create-flutter-project:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Create Flutter project
        run: flutter create my_flutter_app
      
      - name: Push to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add my_flutter_app/
          git commit -m "Add Flutter project" || exit 0
          git push https://anvistanb17-afk:${{ secrets.TOK }}@github.com/anvistanb17-afk/It-s_one_name_on_git_clock_or_github.git HEAD:main
