name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Go to Flutter project
        run: cd my_flutter_app
      
      - name: Install dependencies
        run: |
          cd my_flutter_app
          flutter pub get
      
      - name: Build iOS
        run: |
          cd my_flutter_app
          flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          cd my_flutter_app
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload/
          mv app.ipa ../
      
      - uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: app.ipa
